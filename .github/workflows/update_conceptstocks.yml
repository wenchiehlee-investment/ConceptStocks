name: Update Concept Stocks

on:
  push:
    branches:
      - main
    paths:
      - raw_companyinfo.csv  # triggered by file-sync from Python-Actions.GoodInfo.CompanyInfo
  schedule:
    # Daily update (Mon-Fri) for daily series
    - cron: "15 22 * * 1-5"
    # Weekly update (Fri) for weekly series
    - cron: "45 22 * * 5"
    # Monthly update (1st day) for monthly series
    - cron: "15 23 1 * *"
  workflow_dispatch:
    inputs:
      cadence:
        description: "Cadence to update: daily|weekly|monthly|all|sync"
        required: true
        default: "daily"

jobs:
  sync:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.cadence == 'sync')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout llm library
        uses: actions/checkout@v4
        with:
          repository: wenchiehlee/llm
          path: llm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e llm

      - name: Sync concepts
        run: |
          python3 scripts/update_conceptstocks.py --sync-concepts

      - name: Update concept metadata
        id: update_metadata
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          CODEX_API_URL: ${{ secrets.CODEX_API_URL }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
        run: |
          python3 scripts/update_concept_metadata.py --companyinfo-path raw_companyinfo.csv --keep-extra-concepts

      - name: Create issue if metadata failed
        if: steps.update_metadata.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --repo ${{ github.repository }} --state open --label "gemini-auth" --json number --jq 'length')
          if [ "$EXISTING" -eq "0" ]; then
            gh issue create \
              --repo ${{ github.repository }} \
              --title "🔐 Gemini CLI token 需要重新認證" \
              --label "gemini-auth" \
              --body "## 問題
          \`update_concept_metadata\` 步驟失敗，SmartRoute \`/smart/exec\` 回傳 500。
          Gemini CLI 的 OAuth token 可能遺失或失效。

          ## 解決步驟
          在**有瀏覽器的筆電**上執行：

          \`\`\`bash
          gemini auth login
          \`\`\`

          完成後把 token 複製到 NAS：
          \`\`\`bash
          scp -r ~/.gemini/ <nas_user>@<nas_ip>:/volume1/docker/Llm-Cli-APIServer/gemini-auth/
          docker restart llm-cli-api-server
          \`\`\`

          完成後請關閉此 Issue。

          > 觸發 workflow：[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add raw_companyinfo.csv raw_conceptstock_company_metadata.csv README.md
          git commit -m "Update concept mappings and metadata"
          git pull --rebase
          git push

  update:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.cadence != 'sync'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Update data
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CADENCE="${{ inputs.cadence }}"
          else
            # Determine cadence based on cron schedule
            CRON_EXPR="${{ github.event.schedule }}"
            if [ "$CRON_EXPR" = "15 22 * * 1-5" ]; then
              CADENCE="daily"
            elif [ "$CRON_EXPR" = "45 22 * * 5" ]; then
              CADENCE="weekly"
            elif [ "$CRON_EXPR" = "15 23 1 * *" ]; then
              CADENCE="monthly"
            else
              CADENCE="daily"
            fi
          fi

          echo "CADENCE=$CADENCE" >> "$GITHUB_ENV"

          if [ "$CADENCE" = "daily" ]; then
            START_DATE=$(python3 -c "import csv, os; from datetime import datetime, timedelta; p='raw_conceptstock_daily.csv'; fb=(datetime.utcnow()-timedelta(days=7)).strftime('%Y-%m-%d'); md=max((datetime.strptime(r.get('交易日期'),'%Y-%m-%d').date() for r in csv.DictReader(open(p, newline='', encoding='utf-8')) if r.get('交易日期')), default=None) if os.path.exists(p) else None; print(md.strftime('%Y-%m-%d') if md else fb)")
            echo "Daily incremental start date: $START_DATE"
            python3 scripts/update_conceptstocks.py --provider yahoo --all --cadence daily --start-date "$START_DATE" --ignore-errors
          elif [ "$CADENCE" = "weekly" ]; then
            python3 scripts/update_conceptstocks.py --provider yahoo --all --cadence weekly --ignore-errors
          elif [ "$CADENCE" = "monthly" ]; then
            python3 scripts/update_conceptstocks.py --provider yahoo --all --cadence monthly --ignore-errors
          else
            python3 scripts/update_conceptstocks.py --provider yahoo --all --cadence "$CADENCE" --ignore-errors
          fi

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add raw_conceptstock_daily.csv raw_conceptstock_weekly.csv raw_conceptstock_monthly.csv
          git commit -m "Update concept stock ${CADENCE} data"
          git pull --rebase
          git push
