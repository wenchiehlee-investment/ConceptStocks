name: Sync to Analyzer

on:
  workflow_dispatch:
  push:
     branches:
       - main
     paths:
       - raw_conceptstock_daily.csv
       - raw_conceptstock_weekly.csv
       - raw_conceptstock_monthly.csv
       - raw_conceptstock_company_revenue.csv
       - raw_conceptstock_company_income.csv
       - raw_conceptstock_company_quarterly_segments.csv
       - raw_conceptstock_company_segment_overrides.csv
       - raw_conceptstock_company_metadata.csv
       - raw_column_definition.md
       - .github/sync-to-YahooFinance.yml
       - .github/workflows/sync-to-Analyzer.yml

concurrency:
  group: sync-analyzer
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_PAT_INVESTMENT: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_INVESTMENT }}
      SYNC_PAT_MONEY: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_MONEY }}
      SYNC_PAT_YAHOO: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync up to Python-Actions.GoodInfo.Analyzer
        if: env.SYNC_PAT_INVESTMENT != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_INVESTMENT }}
          CONFIG_PATH: .github/sync-to-Analyzer.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync up to InvestorEvents
        if: env.SYNC_PAT_INVESTMENT != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_INVESTMENT }}
          CONFIG_PATH: .github/sync-InvestorEvents.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync up to InvestorConference
        if: env.SYNC_PAT_MONEY != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_MONEY }}
          CONFIG_PATH: .github/sync-to-InvestorConference.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync up to biztrends.TW
        if: env.SYNC_PAT_MONEY != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_MONEY }}
          CONFIG_PATH: .github/sync-to-biztrends.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync up to Yahoo.Finance
        if: env.SYNC_PAT_YAHOO != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_YAHOO }}
          CONFIG_PATH: .github/sync-to-YahooFinance.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync up to TAIEX.TW
        if: env.SYNC_PAT_MONEY != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_MONEY }}
          CONFIG_PATH: .github/sync-to-TAIEX.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Skip Yahoo sync notice
        if: env.SYNC_PAT_YAHOO == ''
        run: echo "::warning::REPO_FILE_SYNC_WENCHIEHLEE is not configured; skipping Yahoo.Finance sync."
